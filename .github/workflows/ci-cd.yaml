name: CI/CD Pipeline
# This workflow runs only on the master branch
on:
  push:
    branches: [ master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1.Download and checkout the code from the repository
    - name: Checkout code
      uses: actions/checkout@v4

    # 2.Login to Docker Hub with secrets
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 3.Build and push the Docker image to Docker Hub
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # Tag the Docker image with the latest and the commit SHA
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/app-python:latest, ${{ secrets.DOCKERHUB_USERNAME }}/app-python:${{ github.sha }}